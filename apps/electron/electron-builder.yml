appId: dev.chatjs.app
productName: ChatJS
copyright: Copyright © 2025 ChatJS

directories:
  output: release

files:
  - dist/**
  - build/**
  - entitlements.mac.plist
  - package.json

publish:
  provider: github
  owner: FranciscoMoretti
  repo: chat-js
  releaseType: release

mac:
  target:
    - target: dmg
      arch:
        - x64
        - arm64
  category: public.app-category.productivity
  hardenedRuntime: true
  entitlements: entitlements.mac.plist
  entitlementsInherit: entitlements.mac.plist
  gatekeeperAssess: false
  protocols:
    - name: ChatJS Auth
      schemes:
        - chatjs

dmg:
  sign: false

win:
  target:
    - target: nsis
      arch:
        - x64
  protocols:
    - name: ChatJS Auth
      schemes:
        - chatjs

nsis:
  oneClick: false
  allowToChangeInstallationDirectory: true
  createDesktopShortcut: always
  createStartMenuShortcut: true

linux:
  target:
    - target: AppImage
      arch:
        - x64
  category: Network
